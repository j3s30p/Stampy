name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate (tsc + eslint + prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Mirror docs (sync drift check)
        run: npm run sync:docs:check

      - name: Session-state script (smoke test)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          out=$(npm run --silent session)
          echo "$out"
          # 기대 섹션들이 모두 출력되는지 확인 — 라벨/마일스톤 이름 변경 시 silent 깨짐 차단.
          echo "$out" | grep -q "Stampy session state" || { echo "::error::missing header"; exit 1; }
          echo "$out" | grep -q "^Branch"             || { echo "::error::missing Branch section"; exit 1; }
          echo "$out" | grep -q "^Open PRs"           || { echo "::error::missing Open PRs section"; exit 1; }
          echo "$out" | grep -q "^Open milestones"    || { echo "::error::missing Open milestones section"; exit 1; }
          echo "$out" | grep -q "^In-progress"        || { echo "::error::missing In-progress section"; exit 1; }
          echo "$out" | grep -q "^Closed milestones"  || { echo "::error::missing Closed milestones section"; exit 1; }
          echo "$out" | grep -q "^Conventions"        || { echo "::error::missing Conventions section"; exit 1; }

  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose
