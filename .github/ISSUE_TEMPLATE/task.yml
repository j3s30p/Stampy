name: '🧩 Task — 일반 작업'
description: '기능 추가 / 리팩터링 / 작은 변경'
title: '[task] '
labels: ['type/chore', 'status/ready']
body:
  - type: dropdown
    id: area
    attributes:
      label: '어느 영역인가요?'
      options:
        - 'stamp (flutter_app/lib/features/stamp)'
        - 'map (flutter_app/lib/features/map)'
        - 'tour (관광지/TourAPI)'
        - 'core (flutter_app/lib/core)'
        - 'shared (공통 타입/상수/UI)'
        - 'app (flutter_app/lib/app)'
        - 'harness (CI/빌드/tooling)'
        - 'docs (README/docs/GitHub templates)'
        - 'deps (의존성)'
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: '무엇을 / 왜?'
      description: 'WHAT 보다 WHY 중심. 1~3 문장.'
      placeholder: '예: 도장 인증 시 GPS 정확도가 100m 보다 큰 경우 거부하도록 하여 도심 실내에서의 가짜 인증을 막는다.'
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: '완료 조건 (Acceptance criteria)'
      description: '체크리스트 형태. 이게 만족되면 close.'
      placeholder: |
        - [ ] `canCollectStamp` 가 accuracy > 100m 입력에 대해 false 를 반환
        - [ ] 단위 테스트 추가
        - [ ] PR 머지 + 시뮬레이터에서 동작 확인
    validations:
      required: true
  - type: input
    id: related-adr
    attributes:
      label: '관련 ADR (선택)'
      description: 'docs/02-architecture-decisions.md 의 ADR 번호'
      placeholder: 'ADR-006'
