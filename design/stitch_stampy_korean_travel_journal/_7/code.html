<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ink-bleed {
            filter: contrast(120%) brightness(95%) drop-shadow(0px 0px 1px rgba(168, 50, 18, 0.2));
        }
        .paper-texture {
            background-color: #f4f0e8;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
        @keyframes stamp-press {
            0% { transform: scale(1.5) rotate(-5deg); opacity: 0; }
            70% { transform: scale(0.95) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(3deg); opacity: 1; }
        }
        .animate-stamp {
            animation: stamp-press 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .stamp-rotation {
            transform: rotate(3deg);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#007ea1",
                        "primary-fixed-dim": "#ffb4a2",
                        "on-tertiary-fixed": "#001f29",
                        "primary-container": "#ca4a28",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#ffdbd2",
                        "surface-variant": "#e1e3de",
                        "on-primary": "#ffffff",
                        "outline-variant": "#e0bfb7",
                        "on-secondary-container": "#71615a",
                        "secondary-fixed-dim": "#d6c2ba",
                        "on-secondary-fixed-variant": "#52443d",
                        "inverse-primary": "#ffb4a2",
                        "surface-container-high": "#e7e9e4",
                        "on-tertiary-container": "#fbfdff",
                        "tertiary-fixed-dim": "#70d2fa",
                        "secondary-container": "#f3ded5",
                        "on-secondary-fixed": "#241914",
                        "surface-bright": "#f8faf5",
                        "tertiary-fixed": "#bce9ff",
                        "primary": "#a83212",
                        "on-primary-container": "#fffbff",
                        "inverse-surface": "#2e312e",
                        "surface-container-low": "#f3f4ef",
                        "surface-tint": "#ac3414",
                        "tertiary": "#006480",
                        "secondary": "#6a5b54",
                        "on-surface-variant": "#59413b",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#3c0800",
                        "on-tertiary-fixed-variant": "#004d63",
                        "on-surface": "#191c19",
                        "outline": "#8c716a",
                        "surface-dim": "#d9dbd6",
                        "inverse-on-surface": "#f0f1ec",
                        "error": "#ba1a1a",
                        "background": "#f8faf5",
                        "surface-container-highest": "#e1e3de",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#f3ded5",
                        "on-error-container": "#93000a",
                        "surface-container": "#edeee9",
                        "surface": "#f8faf5",
                        "on-primary-fixed-variant": "#891d00",
                        "on-background": "#191c19"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "12px",
                        "gutter": "16px",
                        "section-gap": "40px",
                        "side-padding": "20px",
                        "stack-sm": "4px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-title": ["Pretendard"],
                        "coord-label": ["Geist Mono"],
                        "section-title": ["Pretendard"],
                        "body-main": ["Pretendard"],
                        "ranking-num": ["Geist Mono"],
                        "display-title-mobile": ["Pretendard"]
                    },
                    "fontSize": {
                        "display-title": ["28px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "coord-label": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "section-title": ["20px", {"lineHeight": "1.4", "fontWeight": "700"}],
                        "body-main": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "ranking-num": ["14px", {"lineHeight": "1.0", "fontWeight": "600"}],
                        "display-title-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background font-body-main text-on-background min-h-screen paper-texture flex flex-col items-center justify-center p-side-padding">
<!-- Success Container -->
<main class="w-full max-w-md mx-auto flex flex-col items-center">
<!-- Stamp Visualization Section -->
<div class="relative w-full aspect-square flex items-center justify-center mb-12">
<!-- Background "Paper Block" -->
<div class="absolute inset-0 bg-surface-container-lowest border border-outline-variant rounded-lg transform -rotate-1 shadow-sm opacity-60"></div>
<!-- The Stamp Area -->
<div class="relative z-10 flex flex-col items-center">
<!-- Large Vermilion Stamp -->
<div class="animate-stamp opacity-0 w-64 h-64 relative flex items-center justify-center">
<img alt="Gyeongbokgung Palace Red Ink Seal" class="w-full h-full object-contain ink-bleed stamp-rotation" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8WOXAeeZjAyCVAzpIXaheqGADmE83QqsigBAlCRbhYTx7W-Tan6xopwdH7BWFwQwKDXWhFPPEL6xDC6-XMo8eXjb7PNslpEtc1FFr4m-fA1z3BpEgFhNuVoFcdq6BeKIDSujuD6jWGX_OFKq_LfAHjd9KlvGj4EC-572Q4KLHb2HmjBfxlMGrnMVWMEi_zF9apPsQctPHqXHhd6eS_euNSTLPWz70GkpBPyxsCicMSK7Pxxg58oPzViEnd8tNO8LG5p146q6_r0rk"/>
<!-- Monospace Overlays -->
<div class="absolute -bottom-4 right-0 transform rotate-3 flex flex-col items-end">
<span class="font-coord-label text-coord-label text-primary bg-surface-container-lowest/80 px-2 py-1 border border-outline-variant mb-1">
                            37.5796° N, 126.9770° E
                        </span>
<span class="font-ranking-num text-ranking-num text-secondary bg-surface-container-lowest/80 px-2 py-1 border border-outline-variant">
                            SEOUL · 2026.06.13
                        </span>
</div>
</div>
<!-- Stamp Label -->
<h2 class="mt-8 font-display-title-mobile text-display-title-mobile text-on-surface text-center">
                    경복궁
                </h2>
<p class="mt-2 font-body-main text-secondary text-center">
                    경복궁 도장을 수집했어요
                </p>
</div>
</div>
<!-- Progress Visualization -->
<section class="w-full px-4 mb-section-gap">
<div class="flex justify-between items-end mb-2">
<span class="font-coord-label text-coord-label text-secondary tracking-widest uppercase">Journal Progress</span>
<span class="font-ranking-num text-ranking-num text-primary">9 / 24</span>
</div>
<!-- Tactile Progress Line -->
<div class="h-[2px] w-full bg-outline-variant relative">
<div class="absolute top-0 left-0 h-full bg-primary transition-all duration-1000 ease-out" style="width: 37.5%;"></div>
<!-- Progress Nodes -->
<div class="absolute top-1/2 -translate-y-1/2 left-[37.5%] w-3 h-3 rounded-full bg-primary border-2 border-surface-container-lowest"></div>
</div>
<div class="mt-3 flex justify-between">
<span class="font-coord-label text-[10px] text-on-surface-variant">ENTRY_01</span>
<span class="font-coord-label text-[10px] text-on-surface-variant">GOAL_24</span>
</div>
</section>
<!-- Actions -->
<div class="w-full space-y-4 px-4 pb-12">
<button class="w-full py-4 bg-primary text-surface-container-lowest font-section-title rounded-lg active:scale-95 transition-transform duration-150 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'opsz' 20;">auto_stories</span>
                도장 컬렉션 보기
            </button>
<button class="w-full py-4 bg-transparent border border-outline text-secondary font-section-title rounded-lg hover:bg-surface-container-low active:scale-95 transition-all duration-150 flex items-center justify-center gap-2">
                여행 계속하기
                <span class="material-symbols-outlined" style="font-variation-settings: 'opsz' 20;">arrow_forward</span>
</button>
</div>
</main>
<!-- Navigation Shell Suppressed as per Task Logic (Success Screen) -->
<script>
        // Micro-interaction for haptic-like feel
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });

        // Trigger ink bleed sound effect or extra visual subtle noise if needed
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Stamp success moment initialized.');
        });
    </script>
</body></html>
