<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/mono.css" rel="stylesheet"/>
<!-- Pretendard Variable Font for Korean UI -->
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css');
        }

        body {
            background-color: #F4F0E8; /* Hanji Canvas */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        /* Scanning Line Animation */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scanning-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #a83212; /* Vermilion Stamp */
            box-shadow: 0 0 8px rgba(168, 50, 18, 0.4);
            animation: scan 3s linear infinite;
        }

        /* Archival Texture Overlay */
        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events: none;
        }

        /* Perforation logic */
        .perforation {
            background-image: radial-gradient(#D8D2C7 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* Subtle film grain overlay */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 999;
        }
    </style>

                    "fontSize": {

<style>

<body class="font-body-main text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">

<!-- Main Canvas -->

<div class="w-12 h-[1px] bg-outline-variant my-4"></div>
<p class="font-section-title text-section-title text-on-surface-variant text-center px-4 leading-relaxed">

</div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-side-padding pb-safe h-20 bg-surface-container-lowest border-t border-outline-variant">

<span class="material-symbols-outlined">home</span>

</button>

</button>

</button>

<span class="material-symbols-outlined">person</span>

<script>
        // Micro-interaction: Jitter the distance slightly for "live tracking" feel
        const distanceEl = document.getElementById('distance');
        let baseDistance = 82;

        function updateDistance() {
            const jitter = (Math.random() * 2 - 1).toFixed(1);
            const newDist = (baseDistance + parseFloat(jitter)).toFixed(0);
            distanceEl.textContent = `${newDist} m`;

            // Randomly update archival scan text
            setTimeout(updateDistance, 1500 + Math.random() * 3000);
        }

        updateDistance();

        // Simulate interaction press for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'translateY(1px)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
